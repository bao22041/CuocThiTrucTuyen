<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUỘC THI TRỰC TUYẾN CỤM LIÊN KẾT SỐ 5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        :root {
            /* MÀU ĐẶC TRƯNG ÁO THANH NIÊN VIỆT NAM */
            --tn-blue-dark: #003366;   /* Xanh đậm cổ áo */
            --tn-blue-main: #005c97;   /* Xanh bích thân áo */
            --tn-blue-light: #00a8ff;  /* Xanh sáng tạo điểm nhấn */
            
            --secondary: #0f172a;
            --accent: #00e1ff; 
            --success: #00ffc8;
            --danger: #ff416c;
            --text: #ffffff;
            --text-muted: #cbd5e1; 
            
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            
            /* Bảng màu Huy chương Bảng Xếp Hạng */
            --gold: #FFD700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --silver: #E2E8F0;
            --silver-glow: rgba(226, 232, 240, 0.4);
            --bronze: #FF8C00;
            --bronze-glow: rgba(255, 140, 0, 0.4);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #020617; 
            color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ÁNH SÁNG NỀN (ORBS) XANH THANH NIÊN --- */
        .bg-orb {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -2;
            animation: orbFloat 25s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 600px; height: 600px; background: rgba(0, 168, 255, 0.25);
            top: -150px; left: -100px;
        }
        .orb-2 {
            width: 500px; height: 500px; background: rgba(0, 92, 151, 0.35);
            bottom: -100px; right: -50px; animation-delay: -7s;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(150px, 100px) scale(1.1); }
        }

        /* Lưới nền tinh tế */
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; transition: 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: var(--tn-blue-light); }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            width: 100%; max-width: 1000px; padding: 45px;
            box-sizing: border-box; position: relative; z-index: 10;
        }

        /* --- LOGO --- */
        .logo-container {
            display: flex; justify-content: center; align-items: center;
            gap: 40px; margin-bottom: 25px;
        }
        .logo-container img {
            width: 95px; height: 95px; object-fit: contain; 
            background: rgba(255, 255, 255, 1); 
            border-radius: 50%; padding: 6px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 168, 255, 0.3);
            animation: float 4s ease-in-out infinite; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .logo-container img:nth-child(2) { animation-delay: 1.5s; }
        .logo-container img:hover {
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 35px var(--tn-blue-light);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .screen { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .screen.active { display: block; opacity: 1; transform: translateY(0); }
        
        h1, h2 { text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; text-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        h1 { font-size: 2.6rem; background: linear-gradient(135deg, #ffffff 20%, var(--tn-blue-light) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-top: 0; line-height: 1.3;}
        h2 { font-size: 2rem; color: #fff; }

        /* --- BUTTONS --- */
        .btn-group { display: flex; gap: 20px; justify-content: center; margin-top: 35px; }
        button {
            padding: 16px 36px; border: none; border-radius: 14px;
            background: rgba(255, 255, 255, 0.05); color: white;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 0.5px;
        }
        button:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        button:active { transform: translateY(1px); }
        button.primary { 
            background: linear-gradient(135deg, var(--tn-blue-light) 0%, var(--tn-blue-main) 100%); 
            border: 1px solid rgba(0, 168, 255, 0.5); 
            box-shadow: 0 8px 20px rgba(0, 92, 151, 0.3); 
        }
        button.primary:hover { box-shadow: 0 15px 30px rgba(0, 168, 255, 0.5); border-color: #fff; }
        button.danger { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); border: none; box-shadow: 0 8px 20px rgba(255, 65, 108, 0.3);}
        button.danger:hover { box-shadow: 0 15px 30px rgba(255, 65, 108, 0.5); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; filter: grayscale(1); }

        /* --- FORMS --- */
        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 600; font-size: 1.05rem; color: #fff; letter-spacing: 0.5px; }
        .form-group input {
            width: 100%; padding: 18px 20px; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 14px;
            color: #fff; font-size: 1.15rem; transition: 0.3s; box-sizing: border-box; outline: none;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus { 
            border-color: var(--tn-blue-light); background: rgba(0, 0, 0, 0.5); 
            box-shadow: 0 0 25px rgba(0, 168, 255, 0.2), inset 0 2px 5px rgba(0,0,0,0.5); 
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }

        /* --- QUIZ LAYOUT --- */
        .quiz-layout { display: flex; gap: 40px; flex-wrap: wrap; }
        .quiz-main { flex: 2; min-width: 320px; }
        .quiz-sidebar { flex: 1; min-width: 260px; background: rgba(0,0,0,0.25); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 0 30px rgba(0,0,0,0.4); }

        .header-quiz { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .timer { font-size: 2.2rem; font-weight: 900; color: var(--tn-blue-light); text-shadow: 0 0 20px rgba(0, 168, 255, 0.6); background: rgba(0,0,0,0.5); padding: 10px 25px; border-radius: 14px; border: 1px solid rgba(0,168,255,0.2); }
        
        .question { font-size: 1.5rem; margin-bottom: 35px; font-weight: 700; line-height: 1.6; color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        /* --- HIỆU ỨNG ĐÁP ÁN NỔI BẬT --- */
        .option {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px 25px; margin-bottom: 15px;
            cursor: pointer; transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); font-size: 1.2rem;
            color: var(--text-muted); font-weight: 500; display: flex; align-items: center; gap: 15px;
            position: relative; overflow: hidden;
        }
        .option::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
            background: transparent; transition: 0.3s; border-radius: 5px 0 0 5px;
        }
        .option:hover { 
            background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); 
            transform: translateX(8px); color: #fff; 
        }
        .option.selected { 
            background: linear-gradient(90deg, rgba(0, 168, 255, 0.15) 0%, rgba(0, 168, 255, 0.02) 100%); 
            border-color: var(--tn-blue-light); color: #fff;
            transform: translateX(12px) scale(1.02); font-weight: 700;
        }
        .option.selected::before {
            background: var(--tn-blue-light); box-shadow: 0 0 20px var(--tn-blue-light);
        }

        /* --- MỤC LỤC CÂU HỎI --- */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
        .nav-btn {
            padding: 12px 0; border-radius: 10px; font-weight: 700; font-size: 1.1rem;
            background: rgba(255,255,255,0.05); color: #fff; transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1); text-align: center; cursor: pointer;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        .nav-btn.answered { background: linear-gradient(135deg, var(--tn-blue-main), var(--tn-blue-light)); border-color: transparent; box-shadow: 0 5px 15px rgba(0, 168, 255, 0.3); }
        .nav-btn.current { border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.15); z-index: 2; background: rgba(0, 0, 0, 0.8); }

        /* --- BẢNG XẾP HẠNG TĨNH TẠI & SANG TRỌNG --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; margin-top: 20px; }
        th { background: transparent; font-weight: 900; text-transform: uppercase; font-size: 1rem; letter-spacing: 1.5px; color: var(--tn-blue-light); border: none; padding: 12px 15px; border-bottom: 2px solid rgba(255,255,255,0.1); text-align: center;}
        td { padding: 20px 15px; text-align: center; border: 1px solid transparent; border-width: 1px 0; background: rgba(255, 255, 255, 0.03); font-size: 1.1rem; color: #fff; transition: all 0.3s ease; position: relative;}
        td:first-child { border-radius: 16px 0 0 16px; border-left-width: 1px; }
        td:last-child { border-radius: 0 16px 16px 0; border-right-width: 1px; }
        
        tr:not(.top-row):hover td { background: rgba(255,255,255,0.08); transform: translateY(-2px); }

        @keyframes lightSweep {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        tr.top-row td {
            background-size: 200% auto !important;
            animation: lightSweep 4s linear infinite !important;
        }
        
        /* TOP 1 - VÀNG GOLD */
        tr.top-1 td { 
            background: linear-gradient(90deg, rgba(255,215,0,0.05) 0%, rgba(255,215,0,0.2) 50%, rgba(255,215,0,0.05) 100%);
            border-top-color: rgba(255,215,0,0.4); border-bottom-color: rgba(255,215,0,0.4);
        }
        tr.top-1 td:first-child { border-left-color: rgba(255,215,0,0.4); box-shadow: inset 15px 0 20px -10px var(--gold-glow); }
        tr.top-1 td:last-child { border-right-color: rgba(255,215,0,0.4); box-shadow: inset -15px 0 20px -10px var(--gold-glow); }
        tr.top-1 .name-cell, tr.top-1 .rank-cell { color: var(--gold); text-shadow: 0 0 12px var(--gold); font-weight: 900; font-size: 1.3rem;}
        tr.top-1 .score-cell { color: #fff; text-shadow: 0 0 10px var(--gold); }
        tr.top-1:hover td { transform: translateY(-3px); border-color: var(--gold); box-shadow: 0 10px 20px -5px var(--gold-glow); z-index: 10; }

        /* TOP 2 - BẠC SILVER */
        tr.top-2 td { 
            background: linear-gradient(90deg, rgba(226,232,240,0.05) 0%, rgba(226,232,240,0.15) 50%, rgba(226,232,240,0.05) 100%);
            border-top-color: rgba(226,232,240,0.3); border-bottom-color: rgba(226,232,240,0.3);
        }
        tr.top-2 td:first-child { border-left-color: rgba(226,232,240,0.3); box-shadow: inset 10px 0 15px -10px var(--silver-glow); }
        tr.top-2 td:last-child { border-right-color: rgba(226,232,240,0.3); box-shadow: inset -10px 0 15px -10px var(--silver-glow); }
        tr.top-2 .name-cell, tr.top-2 .rank-cell { color: var(--silver); text-shadow: 0 0 8px var(--silver); font-weight: 800; font-size: 1.25rem;}
        tr.top-2 .score-cell { color: #fff; text-shadow: 0 0 8px var(--silver); }
        tr.top-2:hover td { transform: translateY(-2px); border-color: var(--silver); box-shadow: 0 8px 15px -5px var(--silver-glow); }

        /* TOP 3 - ĐỒNG BRONZE */
        tr.top-3 td { 
            background: linear-gradient(90deg, rgba(255,140,0,0.05) 0%, rgba(255,140,0,0.15) 50%, rgba(255,140,0,0.05) 100%);
            border-top-color: rgba(255,140,0,0.3); border-bottom-color: rgba(255,140,0,0.3);
        }
        tr.top-3 td:first-child { border-left-color: rgba(255,140,0,0.3); box-shadow: inset 10px 0 15px -10px var(--bronze-glow); }
        tr.top-3 td:last-child { border-right-color: rgba(255,140,0,0.3); box-shadow: inset -10px 0 15px -10px var(--bronze-glow); }
        tr.top-3 .name-cell, tr.top-3 .rank-cell { color: var(--bronze); text-shadow: 0 0 8px var(--bronze); font-weight: 800; font-size: 1.2rem;}
        tr.top-3 .score-cell { color: #fff; text-shadow: 0 0 8px var(--bronze); }
        tr.top-3:hover td { transform: translateY(-2px); border-color: var(--bronze); box-shadow: 0 8px 15px -5px var(--bronze-glow); }

        tr.highlight-row td { background: rgba(0, 168, 255, 0.15); border-color: var(--tn-blue-light); color: #fff; box-shadow: 0 0 20px rgba(0,168,255,0.2); }

        /* --- REVEAL SCREEN --- */
        .reveal-circle {
            width: 250px; height: 250px; border-radius: 50%;
            background: conic-gradient(var(--tn-blue-light) 0%, transparent 0%);
            margin: 0 auto 40px; display: flex; justify-content: center; align-items: center;
            position: relative; box-shadow: 0 0 60px rgba(0, 168, 255, 0.3); transition: background 1s ease-out;
        }
        .reveal-circle::before {
            content: ""; position: absolute; inset: 15px;
            background: var(--secondary); border-radius: 50%; box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        .reveal-score-text {
            position: relative; font-size: 5rem; font-weight: 900;
            background: linear-gradient(45deg, #ffffff, var(--tn-blue-light));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.6));
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-content {
            background: linear-gradient(145deg, #1e293b, #0f172a); 
            padding: 40px; border-radius: 24px; width: 90%; max-width: 450px;
            border: 1px solid rgba(0, 168, 255, 0.3); box-shadow: 0 25px 50px rgba(0,0,0,0.8), 0 0 30px rgba(0, 168, 255, 0.15);
            text-align: center; animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalPop { from { transform: scale(0.8) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

    </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="modal-overlay" id="custom-modal">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top:0; color:var(--tn-blue-light); font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 900;">Thông báo</h3>
        <p id="modal-desc" style="color:var(--text-muted); margin-bottom:30px; line-height: 1.7; font-size: 1.15rem;"></p>
        <input type="password" id="admin-pwd" style="display:none; width:100%; padding:18px; margin-bottom:30px; border-radius:14px; border:1px solid rgba(0,168,255,0.3); background:rgba(0,0,0,0.4); color:white; outline:none; text-align:center; font-size: 1.2rem; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); font-family: 'Inter', sans-serif;" placeholder="Nhập mật khẩu Admin...">
        <div class="btn-group" style="margin-top:0; gap: 15px;">
            <button id="modal-btn-cancel" style="display:none; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);" onclick="closeModal()">Hủy Bỏ</button>
            <button id="modal-btn-confirm" class="primary" onclick="closeModal()">Xác Nhận</button>
        </div>
    </div>
</div>

        { q: "Ngày truyền thống của Hội Liên hiệp Thanh niên Việt Nam là ngày tháng nào?", opts: ["09/01", "26/03", "15/10", "22/12"], ans: "15/10" }

    let modalCallback = null;
    function showModal(title, desc, type = 'alert', callback = null) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-desc').innerText = desc;
        document.getElementById('custom-modal').style.display = 'flex';
        
        const pwdInput = document.getElementById('admin-pwd');
        const btnCancel = document.getElementById('modal-btn-cancel');
        
        if(type === 'login') {
            pwdInput.style.display = 'block'; pwdInput.value = ''; pwdInput.focus(); btnCancel.style.display = 'block';
        } else if (type === 'confirm') {
            pwdInput.style.display = 'none'; btnCancel.style.display = 'block';
        } else {
            pwdInput.style.display = 'none'; btnCancel.style.display = 'none';
        }
        modalCallback = callback;
    }

    function closeModal() {
        document.getElementById('custom-modal').style.display = 'none';
        if (modalCallback) {
            const pwd = document.getElementById('admin-pwd').value;
            modalCallback(true, pwd);
            modalCallback = null;
        }
    }
    
    document.getElementById('modal-btn-cancel').onclick = () => {
        document.getElementById('custom-modal').style.display = 'none';
        if(modalCallback) { modalCallback(false, null); modalCallback = null; }
    }

    let currentUser = {};
    let currentUserPhone = ""; 
    let questions = [];
    let currentQuestionIndex = 0;
    let userAnswers = [];
    let startTime;
    let timerInterval;
    const TIME_LIMIT = 25 * 60;
    let timeLeft = TIME_LIMIT;

    function navigate(screenId) {
        const screens = document.querySelectorAll('.screen');
        screens.forEach(s => { s.classList.remove('active'); setTimeout(() => s.style.display = 'none', 400); });
        
        setTimeout(() => {
            const target = document.getElementById(screenId);
            target.style.display = 'block';
            setTimeout(() => target.classList.add('active'), 20);
        }, 400);
    }

    function maskPhone(phone) {
        if(!phone || phone.length < 10) return phone;
        return phone.substring(0, 4) + "***" + phone.substring(7);
    }

    function handleRegister(e) {
        e.preventDefault();
        const phone = document.getElementById('reg-phone').value;
        const existing = JSON.parse(localStorage.getItem('quiz_doan_pro_v6')) || [];
        
        if (existing.some(res => res.phone === phone)) {
            showModal("Từ chối truy cập", "Số điện thoại này đã được hệ thống ghi nhận hoàn thành bài thi. Bạn không thể thi lại!");
            return;
        }

        currentUser = {
            name: document.getElementById('reg-name').value,
            phone: phone,
            area: document.getElementById('reg-area').value
        };
        currentUserPhone = phone; 
        
        document.getElementById('user-info-display').innerText = currentUser.name;
        startQuiz();
    }

    function startQuiz() {
        navigate('quiz-screen');
        questions = [...rawQuestions].sort(() => Math.random() - 0.5);
        questions.forEach(q => q.opts.sort(() => Math.random() - 0.5));
        userAnswers = new Array(25).fill(null);
        currentQuestionIndex = 0;
        timeLeft = TIME_LIMIT;
        startTime = Date.now();
        
        renderQuestionBlock();
        updateQuestionUI();
        renderNavigator();
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('time-left').innerText = `${m}:${s}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                showModal("Hết giờ!", "Thời gian đã kết thúc. Hệ thống đang thu bài...", "alert", submitQuiz);
            }
        }, 1000);
    }

    function renderQuestionBlock() {
        const container = document.getElementById('options-container');
        container.innerHTML = ''; 
        for(let i = 0; i < 4; i++) {
            const div = document.createElement('div');
            div.className = 'option';
            div.id = `opt-${i}`;
            div.onclick = function() {
                document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                this.classList.add('selected');
                const selectedText = this.getAttribute('data-val');
                userAnswers[currentQuestionIndex] = selectedText;
                const navBtn = document.getElementById(`nav-btn-${currentQuestionIndex}`);
                if(navBtn) navBtn.classList.add('answered');
            };
            container.appendChild(div);
        }
    }

    function updateQuestionUI() {
        const q = questions[currentQuestionIndex];
        document.getElementById('question-count').innerText = `CÂU ${currentQuestionIndex + 1} / 25`;
        document.getElementById('question-text').innerText = q.q;
        
        q.opts.forEach((opt, index) => {
            const div = document.getElementById(`opt-${index}`);
            div.innerText = opt;
            div.setAttribute('data-val', opt);
            if(userAnswers[currentQuestionIndex] === opt) { div.classList.add('selected'); } 
            else { div.classList.remove('selected'); }
        });

        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        const nextBtn = document.getElementById('next-btn');
        if (currentQuestionIndex === questions.length - 1) {
            nextBtn.innerText = "Nộp Bài Ngay"; nextBtn.className = "danger";
        } else {
            nextBtn.innerText = "Tiếp theo ➡"; nextBtn.className = "primary";
        }
    }

    function renderNavigator() {
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        questions.forEach((_, index) => {
            const btn = document.createElement('div');
            btn.className = `nav-btn ${userAnswers[index] ? 'answered' : ''} ${index === currentQuestionIndex ? 'current' : ''}`;
            btn.id = `nav-btn-${index}`;
            btn.innerText = index + 1;
            btn.onclick = () => { currentQuestionIndex = index; updateQuestionUI(); renderNavigator(); };
            grid.appendChild(btn);
        });
    }

    function nextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++; updateQuestionUI(); renderNavigator();
        } else {
            const unanswered = userAnswers.filter(ans => ans === null).length;
            const msg = unanswered > 0 ? `Bạn còn ${unanswered} câu chưa làm. Xác nhận nộp bài?` : "Bạn đã hoàn tất bài thi. Xác nhận nộp bài?";
            showModal("Xác nhận nộp bài", msg, "confirm", (isConfirm) => {
                if(isConfirm) submitQuiz();
            });
        }
    }
    function prevQuestion() {
        if (currentQuestionIndex > 0) { currentQuestionIndex--; updateQuestionUI(); renderNavigator(); }
    }

    function submitQuiz() {
        clearInterval(timerInterval);
        const timeTakenSec = Math.floor((Date.now() - startTime) / 1000); 
        let score = 0;
        userAnswers.forEach((ans, idx) => { if (ans === questions[idx].ans) score++; });

        const resultRecord = { ...currentUser, score, timeTaken: timeTakenSec };
        const existingResults = JSON.parse(localStorage.getItem('quiz_doan_pro_v6')) || [];
        existingResults.push(resultRecord);
        localStorage.setItem('quiz_doan_pro_v6', JSON.stringify(existingResults));

        currentUser = {}; 
        
        navigate('reveal-screen');
        animateScoreReveal(score);
    }

    function animateScoreReveal(finalScore) {
        let currentDisplay = 0;
        const scoreSpan = document.getElementById('reveal-score');
        const circle = document.getElementById('reveal-circle');
        const msg = document.getElementById('reveal-msg');
        
        msg.innerText = "Hệ thống đang tổng hợp...";
        
        const interval = setInterval(() => {
            scoreSpan.innerText = currentDisplay;
            const degree = (currentDisplay / 25) * 360;
            circle.style.background = `conic-gradient(var(--tn-blue-light) ${degree}deg, transparent 0deg)`;
            
            if(currentDisplay >= finalScore) {
                clearInterval(interval);
                if(finalScore === 25) msg.innerText = "Tuyệt đỉnh! Bạn là chuyên gia về Đoàn!";
                else if (finalScore >= 15) msg.innerText = "Rất tốt! Bạn nắm vững kiến thức Đoàn.";
                else msg.innerText = "Hoàn thành bài thi! Hãy tiếp tục trau dồi nhé.";
            } else {
                currentDisplay++;
            }
        }, 60);
    }

    function showLeaderboard(highlightPhone = null) {
        navigate('leaderboard-screen');
        const results = JSON.parse(localStorage.getItem('quiz_doan_pro_v6')) || [];
        results.sort((a, b) => b.score !== a.score ? b.score - a.score : a.timeTaken - b.timeTaken);

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        results.forEach((res, index) => {
            const tr = document.createElement('tr');
            
            if (index === 0) tr.classList.add('top-row', 'top-1');
            else if (index === 1) tr.classList.add('top-row', 'top-2');
            else if (index === 2) tr.classList.add('top-row', 'top-3');
            
            if(res.phone === highlightPhone) tr.classList.add('highlight-row');
            
            tr.innerHTML = `
                <td class="rank-cell">
                    ${index === 0 ? '👑 #1' : index === 1 ? '🥈 #2' : index === 2 ? '🥉 #3' : '#' + (index + 1)}
                </td>
                <td class="name-cell">${res.name}</td>
                <td style="color:var(--text-muted); opacity: 0.8;">${maskPhone(res.phone)}</td>
                <td style="font-weight: 500;">${res.area}</td>
                <td class="score-cell" style="font-weight: 900; font-size:1.3rem;">${res.score}</td>
                <td style="font-weight: 500; color:var(--text-muted);">${Math.floor(res.timeTaken / 60)}p ${res.timeTaken % 60}s</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function promptAdminLogin() {
        showModal("Xác thực Quản trị viên", "Nhập mật khẩu Admin (admin123) để tải dữ liệu hệ thống.", "login", (isConfirm, pwd) => {
            if(isConfirm) {
                if(pwd === "admin123") { exportToCSV(); } 
                else { setTimeout(() => showModal("Lỗi xác thực", "Mật khẩu không chính xác!", "alert"), 400); }
            }
        });
    }

    function exportToCSV() {
        const data = JSON.parse(localStorage.getItem('quiz_doan_pro_v6')) || [];
        if(data.length === 0) { setTimeout(() => showModal("Lỗi", "Chưa có dữ liệu thí sinh.", "alert"), 400); return; }
        
        let csvContent = "data:text/csv;charset=utf-8,\uFEFFHạng,Họ Tên,Số Điện Thoại,Khu Vực,Điểm,Thời Gian (Giây)\n";
        data.sort((a, b) => b.score !== a.score ? b.score - a.score : a.timeTaken - b.timeTaken);
        data.forEach((row, idx) => { csvContent += `${idx + 1},"${row.name}","${row.phone}","${row.area}",${row.score},${row.timeTaken}\n`; });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Thong_Ke_Thi_Doan_TNCS.csv");
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }
</script>
